goals:
  - "Interjúk és kutatási jegyzetek MI-vel támogatott összefoglalása a NearPick fejlesztési igényeihez."
  - "Ajánlórendszer szabályainak és pontozófüggvény-ötleteinek generálása, baseline-ok definiálása."
  - "UX szövegek és értesítési sablonok több változatban való megfogalmazása."
  - "Tesztadatok és validációs esetek gyors előállítása fejlesztés közben."

operational_cadence:
  check_in: "Heti két alkalommal átnézem az MI-eszközök javaslatait és dokumentálom, mit használok fel."
  review_partner: "Minden sprint végén egyeztetek a konzulenssel az MI által generált anyagokról."

guardrails:
  - "Nem továbbítok személyes vagy azonosítható adatot MI-eszköz felé."
  - "Minden generált tartalmat manuálisan ellenőrzök és szükség esetén módosítok."
  - "Az MI által javasolt kódot vagy szabályt csak tesztelés után építem be az alkalmazásba."
  - "Adatvédelmi megfelelés: helyadatokat és preferenciákat anonimizálva kezelem."

tools:
  - name: "ChatGPT"
    use_cases:
      - "Cikkek és interjúk összefoglalása"
      - "Ajánlási szabályok és pontozófüggvények ötletelése"
      - "UX szövegek finomhangolása"
      - "Tesztadatok generálása"
  - name: "GitHub Copilot"
    use_cases:
      - "Flutter widget-vázak és állapotkezelési minták megírása"
      - "Firestore lekérdezések és Cloud Functions boilerplate generálása"
