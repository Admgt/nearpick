meta:
  version: "0.1"
  last_updated: "2025-10-18"
problem:
  statement: "A városi kiskereskedők nap végén megmaradó, gyorsan romló készleteit nehéz célzottan és időben eljuttatni a megfelelő vevőkhöz; a jelenlegi megoldások csomag-centrikusak és nem termékszintűek, így a fogyasztók nem kapnak személyre szabott, hely- és preferenciaalapú értesítést a valóban releváns tételekről."
target_audience:
  personas:
    - name: "Zsófi, a tudatos diák"
      segment: "Egyetemista, mobilon keres kedvező, közeli termékeket hazafelé."
      needs:
        - "Személyre szabott ajánlatok a kedvenc kategóriáiból"
        - "Közeli boltok valós idejű készlete és árak"
        - "Push értesítés, amikor releváns termék elérhető"
    - name: "Péter, a pékség-tulaj"
      segment: "Kis bolt vezetője, hektikus napi kereslettel és romlandó készlettel."
      needs:
        - "Gyors termékfeltöltés és készletkezelés telefonról"
        - "Célzott elérés azokhoz, akiket érdekel az adott termék"
        - "Egyszerű statisztikák a veszteség és leárazások hatásáról"
    - name: "Kata, a fenntarthatóságra figyelő vásárló"
      segment: "Dolgozó fiatal, rugalmas időbeosztással."
      needs:
        - "Elkerülni az élelmiszerpazarlást célzott vásárlással"
        - "Szűrés diétás preferenciák és allergének szerint"
value_proposition:
  concise: "A NearPick egy Flutter + Firebase alapú mobilalkalmazás, amely a boltok nap végi, konkrét termékeit személyre szabottan, hely- és preferenciaalapon ajánlja a felhasználóknak, így csökkentve a pazarlást és növelve a bolti bevételt."
  differentiators:
    - "Termékszintű (nem csomag-alapú) ajánlás és értesítés"
    - "Könnyen magyarázható szabályalapú ajánlómotor, opcionális ML-bővítéssel"
    - "Hely- és időérzékeny értesítések (közelség, lejárati ablak)"
    - "Kereskedői analitika: maradék, leárazás-hatás, megnyitások/kattintások"
scope:
  in:
    - "Felhasználói és kereskedői regisztráció (Firebase Auth, szerepkörök)"
    - "Termékfeltöltés képpel, készlettel, lejárati idővel (Firestore + Storage)"
    - "Személyre szabott feed és szűrők (kategória, távolság, lejárat)"
    - "Push értesítések releváns új termékekről (FCM + Cloud Functions)"
    - "Alap ajánlás: tag- és preferenciaegyezés, frissesség, távolság, népszerűség"
    - "Kereskedői mini-dashboard (alap statisztikák)"
    - "Firestore Security Rules és alap audit események"
  out:
    - "Teljes értékű online fizetés és számlázás"
    - "Komplex dinamikus árazás és készletjóslás"
    - "Webes admin felület (első verzióban)"
    - "Kurír/last-mile logisztika integráció"
success_metrics:
  - "≥15 korai felhasználó és ≥5 bolt aktív részvétele 2 héten át."
  - "Értesítések megnyitási aránya (push open rate) ≥30% az első pilotban."
  - "Ajánlott termékekre kattintási arány (CTR) ≥12% a baseline feedhez képest +5%p javulás."
  - "A napi megmaradt készlet értékének csökkenése a pilot boltoknál ≥20%."
  - "Felhasználói elégedettség átlag ≥4/5 a relevancia kérdésben."
risks:
  - "Adatvédelmi kockázatok (helyadatok, preferenciák) és GDPR-kompatibilitás"
  - "Kereskedői onboarding lassúsága és adatbevitel terhe"
  - "Értesítés-fáradás (spam érzet) alacsony célzási pontosság esetén"
  - "Helypontosság és készletfrissítés megbízhatósága különböző bolti környezetekben"
first_tech_decision_ref: "sprints/01/architecture/adr/0001-first-tech-choice.md"
research_summary:
  insights:
    - "A boltok gyakran manuálisan, ad-hoc módon árazzák le a maradékot zárás előtt."
    - "A felhasználók a konkrét termékeket preferálják a meglepetéscsomagokkal szemben, ha van választási lehetőség."
    - "A helyalapú, időkritikus értesítések relevánsabbnak hatnak, ha szűk preferencia-profilra céloznak."
  pain_points:
    - "A termékek gyors lejárata miatt perceken múlik az értékesítés — a késői kommunikáció nem hatékony."
    - "A jelenlegi appok kevés kontrollt adnak termékszintű preferenciák felett."
    - "A kereskedőknek nincs egyszerű, mobil-első eszközük a maradékok célzott promózására."
