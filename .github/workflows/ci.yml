name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_PROJECT_DIR: mobile/nearpick
  FUNCTIONS_DIR: functions
  FLUTTER_CHANNEL: stable
  FLUTTER_VERSION: 3.41.3
  NODE_VERSION: "22"

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Prepare Firebase options (CI fallback)
        shell: bash
        run: |
          if [ ! -f "${{ env.FLUTTER_PROJECT_DIR }}/lib/firebase_options.dart" ]; then
            cp "${{ env.FLUTTER_PROJECT_DIR }}/lib/firebase_options.example.dart" \
               "${{ env.FLUTTER_PROJECT_DIR }}/lib/firebase_options.dart"
          fi

      - name: Flutter pub get
        working-directory: ${{ env.FLUTTER_PROJECT_DIR }}
        run: flutter pub get

      - name: Flutter format gate
        working-directory: ${{ env.FLUTTER_PROJECT_DIR }}
        run: dart format --set-exit-if-changed .

      - name: Flutter analyze
        working-directory: ${{ env.FLUTTER_PROJECT_DIR }}
        run: flutter analyze

      - name: Setup Node (functions)
        if: ${{ hashFiles('functions/package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Functions npm ci
        if: ${{ hashFiles('functions/package.json') != '' }}
        working-directory: ${{ env.FUNCTIONS_DIR }}
        run: npm ci

      - name: Functions lint (if present)
        if: ${{ hashFiles('functions/package.json') != '' }}
        working-directory: ${{ env.FUNCTIONS_DIR }}
        run: npm run lint

      - name: Repository secret scan
        shell: bash
        run: bash scripts/secret_scan.sh

      - name: Functions dependency audit
        if: ${{ hashFiles('functions/package.json') != '' }}
        working-directory: ${{ env.FUNCTIONS_DIR }}
        shell: bash
        run: |
          mkdir -p reports
          rm -rf .tmp-audit
          mkdir -p .tmp-audit
          cp package.json package-lock.json .tmp-audit/
          pushd .tmp-audit >/dev/null
          npm ci --omit=dev
          set +e
          npm audit --omit=dev --audit-level=high --json > ../reports/npm-audit.json 2> ../reports/npm-audit.stderr.log
          status=$?
          set -e
          popd >/dev/null
          rm -rf .tmp-audit
          test -f reports/npm-audit.json
          if [ "$status" -ne 0 ]; then
            node -e "const fs=require('fs'); const path='reports/npm-audit.json'; try { const report=JSON.parse(fs.readFileSync(path,'utf8')); const vulnerabilities=Object.entries(report.vulnerabilities||{}).filter(([, details]) => details && ['high','critical'].includes(details.severity)); if (vulnerabilities.length > 0) { console.error('A functions dependency audit magas kockazatu vagy kritikus talalatot jelzett:'); for (const [name, details] of vulnerabilities) { const via=(details.via||[]).map((item)=>typeof item === 'string' ? item : item.name).join(', '); console.error('- ' + name + ' [' + details.severity + ']' + (via ? ' via ' + via : '')); } } else { console.error('A functions dependency audit hibaval tert vissza, de a report nem tartalmaz high/critical serulekenyseget.'); if (fs.existsSync('reports/npm-audit.stderr.log')) { const stderr=fs.readFileSync('reports/npm-audit.stderr.log','utf8').trim(); if (stderr) { console.error(stderr); } } } } catch (error) { console.error('A functions dependency audit report nem feldolgozhato JSON.'); if (fs.existsSync(path)) { console.error(fs.readFileSync(path,'utf8')); } if (fs.existsSync('reports/npm-audit.stderr.log')) { const stderr=fs.readFileSync('reports/npm-audit.stderr.log','utf8').trim(); if (stderr) { console.error(stderr); } } }"
            exit "$status"
          fi

      - name: Upload security artifacts
        if: ${{ always() && (hashFiles('reports/security/*') != '' || hashFiles('functions/reports/*') != '') }}
        uses: actions/upload-artifact@v4
        with:
          name: quality-security-evidence
          path: |
            reports/security/*
            functions/reports/*
          if-no-files-found: error

  build:
    name: build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Prepare Firebase options (CI fallback)
        shell: bash
        run: |
          if [ ! -f "${{ env.FLUTTER_PROJECT_DIR }}/lib/firebase_options.dart" ]; then
            cp "${{ env.FLUTTER_PROJECT_DIR }}/lib/firebase_options.example.dart" \
               "${{ env.FLUTTER_PROJECT_DIR }}/lib/firebase_options.dart"
          fi

      - name: Flutter pub get
        working-directory: ${{ env.FLUTTER_PROJECT_DIR }}
        run: flutter pub get

      - name: Flutter build web
        working-directory: ${{ env.FLUTTER_PROJECT_DIR }}
        run: flutter build web --release

      - name: Setup Node (functions)
        if: ${{ hashFiles('functions/package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Functions npm ci
        if: ${{ hashFiles('functions/package.json') != '' }}
        working-directory: ${{ env.FUNCTIONS_DIR }}
        run: npm ci

      - name: Functions build (if present)
        if: ${{ hashFiles('functions/package.json') != '' }}
        working-directory: ${{ env.FUNCTIONS_DIR }}
        run: npm run build --if-present

      - name: Upload Flutter web artifact
        if: ${{ always() && hashFiles('mobile/nearpick/build/web/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: nearpick-web-build
          path: mobile/nearpick/build/web
          if-no-files-found: error

  test:
    name: test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Prepare Firebase options (CI fallback)
        shell: bash
        run: |
          if [ ! -f "${{ env.FLUTTER_PROJECT_DIR }}/lib/firebase_options.dart" ]; then
            cp "${{ env.FLUTTER_PROJECT_DIR }}/lib/firebase_options.example.dart" \
               "${{ env.FLUTTER_PROJECT_DIR }}/lib/firebase_options.dart"
          fi

      - name: Flutter pub get
        working-directory: ${{ env.FLUTTER_PROJECT_DIR }}
        run: flutter pub get

      - name: Install JUnit converter
        run: |
          dart pub global activate junitreport
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Flutter unit/widget tests + JUnit
        working-directory: ${{ env.FLUTTER_PROJECT_DIR }}
        shell: bash
        run: |
          set -o pipefail
          mkdir -p reports
          flutter test --machine | tojunit > reports/junit-flutter.xml

      - name: Flutter integration tests (if present)
        if: ${{ hashFiles('mobile/nearpick/integration_test/**/*_test.dart') != '' }}
        working-directory: ${{ env.FLUTTER_PROJECT_DIR }}
        shell: bash
        run: |
          mkdir -p reports
          set -o pipefail
          flutter devices | tee reports/flutter-integration-devices.txt
          device_id="$(flutter devices | grep 'android' | head -n1 | sed 's/^[[:space:]]*//; s/[[:space:]]*•.*//')"
          if [ -z "$device_id" ]; then
            echo "Skipping integration_test in CI: no Android emulator/device is configured on this runner." | tee reports/flutter-integration-test.txt
            exit 0
          fi
          flutter test integration_test -d "$device_id" | tee reports/flutter-integration-test.txt

      - name: Setup Node (functions)
        if: ${{ hashFiles('functions/package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Functions npm ci
        if: ${{ hashFiles('functions/package.json') != '' }}
        working-directory: ${{ env.FUNCTIONS_DIR }}
        run: npm ci

      - name: Functions tests (if present)
        if: ${{ hashFiles('functions/package.json') != '' }}
        working-directory: ${{ env.FUNCTIONS_DIR }}
        shell: bash
        run: |
          mkdir -p reports
          set -o pipefail
          npm run test -- --test-reporter=spec | tee reports/functions-test.txt

      - name: Upload Flutter JUnit artifact
        if: ${{ always() && hashFiles('mobile/nearpick/reports/junit-flutter.xml') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: flutter-junit
          path: mobile/nearpick/reports/junit-flutter.xml
          if-no-files-found: error

      - name: Upload test evidence artifacts
        if: ${{ always() && (hashFiles('mobile/nearpick/reports/*') != '' || hashFiles('functions/reports/*') != '') }}
        uses: actions/upload-artifact@v4
        with:
          name: quality-test-evidence
          path: |
            mobile/nearpick/reports/*
            functions/reports/*
          if-no-files-found: error
